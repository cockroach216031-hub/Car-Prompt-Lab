title: "比例 (Ratio)", icon: "📐", options: { "9:16 (手機)": "--ar 9:16", "16:9 (橫向)": "--ar 16:9", "3:2 (專業)": "--ar 3:2", "2:3 (垂直)": "--ar 2:3", "4:5 (IG)": "--ar 4:5", "1:1 (正方)": "--ar 1:1", "4:3 (數位相機)": "--ar 4:3", "21:9 (超寬屏)": "--ar 21:9" } }
        ];

        let selectedOptions = {};
        let customTags = [];
        const basePrefix = "Cinematic car photography, ultra-realistic, 8k resolution, highly detailed";

        function init() {
            const container = document.getElementById('lab-content');
            
            // 1. 渲染 150 輛車 (佔據兩欄寬度，以 4 類別排列)
            const vDiv = document.createElement('div');
            vDiv.className = 'glass-card p-6 rounded-2xl lg:col-span-4';
            let vHtml = `<div class="flex items-center gap-2 mb-6 border-b border-white/5 pb-2"><span class="text-xl">🏎️</span><h3 class="font-bold text-gray-200 text-xs uppercase tracking-widest">Master Vehicle Database (150 Units)</h3></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">`;
            
            for (const [groupName, models] of Object.entries(vehicleDatabase)) {
                vHtml += `<div class="flex flex-col gap-2">
                            <h4 class="text-[10px] text-blue-500 font-black uppercase tracking-tighter mb-1">${groupName}</h4>
                            <div class="flex flex-col gap-1 overflow-y-auto max-h-56 pr-2 custom-scrollbar">
                                ${Object.entries(models).map(([label, value]) => `<button onclick="toggle('Vehicle', '${value}', false)" data-cat="Vehicle" data-val="${value}" class="option-btn text-left px-2 py-1.5 rounded-md text-[9px] font-medium text-gray-400 bg-slate-800/20">${label}</button>`).join('')}
                            </div>
                          </div>`;
            }
            vHtml += `</div>`;
            vDiv.innerHTML = vHtml;
            container.appendChild(vDiv);

            // 2. 渲染其他分類
            otherCats.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'glass-card p-6 rounded-2xl';
                const optsHtml = Object.entries(cat.options).map(([label, value]) => `<button onclick="toggle('${cat.title}', '${value}', ${cat.multi || false})" data-cat="${cat.title}" data-val="${value}" class="option-btn px-3 py-1.5 rounded-lg text-[10px] font-medium text-gray-400 bg-slate-800/30">${label}</button>`).join('');
                div.innerHTML = `<div class="flex items-center gap-2 mb-4 border-b border-white/5 pb-2"><span class="text-xl">${cat.icon}</span><h3 class="font-bold text-gray-200 text-[10px] uppercase tracking-tighter">${cat.title}</h3></div><div class="flex flex-wrap gap-2">${optsHtml}</div>`;
                container.appendChild(div);
            });
        }

        function toggle(cat, val, isMulti) {
            if (!selectedOptions[cat]) selectedOptions[cat] = [];
            if (isMulti) {
                const i = selectedOptions[cat].indexOf(val);
                if (i > -1) selectedOptions[cat].splice(i, 1);
                else selectedOptions[cat].push(val);
            } else { selectedOptions[cat] = [val]; }
            renderUI();
            updatePrompt();
        }

        function renderUI() {
            document.querySelectorAll('.option-btn').forEach(btn => {
                const cat = btn.getAttribute('data-cat');
                const val = btn.getAttribute('data-val');
                if (selectedOptions[cat] && selectedOptions[cat].includes(val)) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        function updatePrompt() {
            const flatTags = [];
            let ratio = "";
            Object.entries(selectedOptions).forEach(([title, choices]) => {
                if (title.includes("Ratio")) { ratio = choices[0] || ""; } 
                else { flatTags.push(...choices); }
            });
            const finalTags = [...flatTags, ...customTags];
            document.getElementById('counter').innerText = `Tags: ${finalTags.length + (ratio ? 1 : 0)}`;
            document.getElementById('final-prompt').value = finalTags.length > 0 ? `${basePrefix}, ${finalTags.join(", ")} ${ratio}`.trim() : "";
        }

        function addCustomTag() {
            const val = document.getElementById('custom-tag-input').value.trim();
            if (val && !customTags.includes(val)) { customTags.push(val); renderCustomTags(); updatePrompt(); document.getElementById('custom-tag-input').value = ""; }
        }

        function renderCustomTags() {
            const display = document.getElementById('custom-tags-display');
            display.innerHTML = customTags.map(tag => `<span class="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] flex items-center gap-2">${tag} <button onclick="removeCustomTag('${tag}')">×</button></span>`).join('');
        }

        function removeCustomTag(tag) { customTags = customTags.filter(t => t !== tag); renderCustomTags(); updatePrompt(); }
        function clearAll() { selectedOptions = {}; customTags = []; renderUI(); renderCustomTags(); updatePrompt(); }
        function copyPrompt() { const txt = document.getElementById('final-prompt'); if(!txt.value) return; navigator.clipboard.writeText(txt.value).then(() => alert("Master Prompt Copied!")); }
        function googleSearchOnlyTags() {
            const flat = Object.entries(selectedOptions).filter(([t]) => !t.includes("Ratio")).map(([_, c]) => c).flat();
            const terms = [...flat, ...customTags];
            if (terms.length === 0) return alert("Select some tags first!");
            window.open(`https://www.google.com/search?q=${encodeURIComponent(terms.join(" "))}&tbm=isch`, '_blank');
        }
        function randomPick() {
            selectedOptions = {};
            const allCats = [{title: 'Vehicle', options: Object.values(vehicleDatabase).flatMap(g => Object.values(g)), multi: false}, ...otherCats];
            allCats.forEach(cat => {
                const vals = Array.isArray(cat.options) ? cat.options : Object.values(cat.options);
                selectedOptions[cat.title] = [vals[Math.floor(Math.random() * vals.length)]];
            });
            renderUI(); updatePrompt();
        }

        init();
    </script>
</body>
</html>
